# ==========================================
# [AWS 배포용] t3.nano 최적화 docker-compose
# ==========================================
version: '3.8'

services:
  # 1. 데이터베이스 (PostgreSQL) 설정
  chat-db:
    image: postgres:15-alpine
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: mychatuser
      POSTGRES_PASSWORD: mychatpassword
      POSTGRES_DB: chat_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. 백엔드 서버 (NestJS) 설정
  chat-api:
    build: .
    container_name: chat-nestjs
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://mychatuser:mychatpassword@chat-db:5432/chat_service_db?schema=public"
      JWT_SECRET: "dev-secret-key-12345"
      JWT_ACCESS_SECRET: "dev-secret-key-12345"
      JWT_REFRESH_SECRET: "dev-refresh-secret-key-67890"
      NODE_ENV: production
    depends_on:
      - chat-db
volumes:
  postgres_data:
